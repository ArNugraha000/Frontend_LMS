<div class="landing-container">
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">SRI E-Learning</div>
    <div class="menu">
      <button
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Beranda
      </button>

      <button routerLink="/about" routerLinkActive="active">Tentang</button>

      <button routerLink="/register" routerLinkActive="active" class="register">
        Daftar Akun
      </button>

      <button routerLink="/login" routerLinkActive="active">Masuk</button>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="overlay"></div>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- GARIS PUTIH BAWAH -->
  <div class="bottom-shape"></div>
</div>

<style>
  /* RESET */
  .landing-container {
    font-family: Arial, sans-serif;
  }

  /* NAVBAR */
  .navbar {
    position: absolute;
    top: 30px; /* geser ke bawah */
    width: 100%;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    z-index: 10;
  }

  .menu button {
    margin-left: 15px;
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    background: transparent;
    color: white;
    cursor: pointer;
  }

  .menu {
    margin-right: 15vh; /* dorong ke kiri */
  }

  .logo {
    font-size: 22px; /* gedein */
    letter-spacing: 1px; /* biar lebih elegan */
    margin-left: 20vh;
  }

  .menu .active {
    background: white;
    color: red;
  }

  .menu button.active {
    background: white;
    color: red;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 100vh;
    background-image: url("/assets/img/SRI-LANDINGPAGE-2.jpg");
    background-size: cover;
    background-position: center;
  }

  /* OVERLAY ORANGE */
  .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(186, 30, 3, 0.8); /* orange + opacity */
  }

  /* CONTENT */
  .landing-container .content {
    position: relative;
    z-index: 2;
    color: white;
    padding: 28vh 20vh;
    max-width: 57%;
  }

  .content h1 {
    font-size: 40px;
    font-weight: bold;
  }

  .content p {
    margin-top: 20px;
    line-height: 1.6;
  }

  /* BUTTON */
  .buttons {
    margin-top: 30px;
  }

  .primary {
    background: red;
    color: white;
    border: none;
    padding: 12px 20px;
    margin-right: 10px;
    border-radius: 5px;
  }

  .secondary {
    background: white;
    color: red;
    border: none;
    padding: 12px 20px;
    border-radius: 5px;
  }

  /* GARIS MIRING PUTIH */
  .bottom-shape {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17vh;
    background: white;
    transform: skewY(4deg);
    transform-origin: top left;
  }

  button:active {
    transform: scale(0.97); /* efek klik */
  }

  button:focus {
    outline: none;
    box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5); /* putih soft */
  }

  /* ================= RESPONSIVE (HP) ================= */
  @media (max-width: 768px) {
    /* NAVBAR */
    .navbar {
      padding: 15px 20px;
      flex-direction: column;
      align-items: flex-start;
      top: 20px;
    }

    .menu {
      margin-top: 10px;
      margin-right: auto;
    }

    .menu button {
      margin-left: 0;
      margin-right: 10px;
      padding: 6px 12px;
      font-size: 12px;
    }

    /* HERO */
    .hero {
      height: 100vh;
      overflow: hidden; /* 🔥 cegah nambah tinggi */
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden; /* 🔥 hilangkan scroll */
    }
    /* CONTENT */
    .content {
      padding: 120px 80px; /* 🔥 lebih aman */
      box-sizing: border-box;
      max-width: 100%;
      text-align: left;
    }

    .content h1 {
      font-size: 26px;
      line-height: 1.3;
    }

    .content p {
      font-size: 14px;
    }

    /* BUTTON */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .primary,
    .secondary {
      width: 100%;
      text-align: center;
    }

    /* GARIS PUTIH */
    .bottom-shape {
      height: 80px;
      transform: skewY(4deg);
    }
  }
</style>
