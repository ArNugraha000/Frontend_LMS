<!-- SEKSI -->
<li [ngbNavItem]="'seksi'" class="nav-item">
  <a ngbNavLink class="nav-link">
    <div class="step-item">
      <div class="btn-icon-outline-circle">
        <i class="bi bi-gear-wide-connected"></i>
      </div>
      <div class="step-label">Seksie</div>
    </div>
  </a>

  <ng-template ngbNavContent>
    <div class="tab-content-wrapper">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <button class="btn-modern" (click)="tambah('seksi')">
          <i class="bi bi-plus-lg"></i> Tambah
        </button>

        <!-- CENTER: SEARCH -->
        <div style="width: 300px">
          <input
            type="text"
            class="form-control"
            placeholder="Cari Seksie..."
            [(ngModel)]="searchSeksi"
            style="border-radius: 10px"
          />
        </div>

        <!-- RIGHT (kosong biar balance) -->
        <div style="width: 15vh"></div>
      </div>

      <div class="table-responsive">
        <div class="mb-3"></div>
        <table class="table table-striped table-hover">
          <thead class="table-light">
            <tr>
              <th>No</th>
              <th>Kode</th>
              <th>Nama</th>
              <th>Departemen</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of pagedSeksi; let i = index">
              <td>{{ i + 1 }}</td>
              <td>{{ item.sekJudul }}</td>
              <td>{{ item.sekNama }}</td>
              <td>{{ item.depNama }}</td>
              <td>
                <span
                  [ngClass]="
                    item.sekStatus === 'AKTIF'
                      ? 'badge-custom-active'
                      : 'badge-custom-outline'
                  "
                >
                  {{ item.sekStatus }}
                </span>
              </td>
              <td>
                <div class="action-container">
                  <!-- EDIT BUTTON -->
                  <button class="btn-icon" (click)="editSeksie(item)">
                    <i class="bi bi-pencil"></i>
                  </button>

                  <!-- TOGGLE SWITCH -->
                  <label class="switch">
                    <input
                      type="checkbox"
                      [checked]="item.sekStatus?.toUpperCase() === 'AKTIF'"
                      (click)="confirmToggleStatus($event, item, 'seksi')"
                    />
                    <span class="slider"></span>
                  </label>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-3">
      <select
        class="form-control"
        style="width: 120px"
        [(ngModel)]="pageSizeSeksi"
        (change)="pageSeksi = 1"
      >
        <option *ngFor="let opt of pageSizeOptions" [ngValue]="opt">
          {{ opt }}
        </option>
      </select>

      <div>
        <button
          class="btn btn-sm btn-outline-secondary me-2"
          (click)="pageSeksi = pageSeksi - 1"
          [disabled]="pageSeksi === 1"
        >
          Prev
        </button>

        {{ pageSeksi }} / {{ totalPagesSeksi }}

        <button
          class="btn btn-sm btn-outline-secondary ms-2"
          (click)="pageSeksi = pageSeksi + 1"
          [disabled]="pageSeksi === totalPagesSeksi"
        >
          Next
        </button>
      </div>
    </div>
  </ng-template>
</li>

<link
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  rel="stylesheet"
/>

<ng-template #modalDivisi let-modal>
  <div class="modal-header">
    <h5 class="modal-title">
      {{ isEditDivisi ? "Edit Divisi" : "Tambah Divisi" }}
    </h5>
    <button type="button" class="btn-close-custom" (click)="modal.dismiss()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <div class="modal-body">
    <div class="mb-3">
      <label>Kode</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="formDivisi.divJudul"
      />
    </div>

    <div class="mb-3">
      <label>Nama</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="formDivisi.divNama"
      />
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-modern-outline" (click)="modal.dismiss()">Batal</button>
    <button class="btn-modern" (click)="saveDivisi(modal)">
      {{ isEditDivisi ? "Ubah" : "Simpan" }}
    </button>
  </div>
</ng-template>
